   so this single HTML file has zero runtime dependency risk).
   Each icon is a small React component matching the lucide-react
   API used elsewhere in this file: <IconName size={16} />
   ============================================================ */
function svgIcon(paths) {
  return function Icon({ size = 18, className = "", strokeWidth = 2 }) {
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        {paths}
      </svg>
    );
  };
}

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return seedData();
}
function persist(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch (e) { console.warn("Storage full or unavailable", e); }
}
function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ============================================================

function Button({ children, variant = "primary", size = "md", className = "", ...props }) {
  const base = "inline-flex items-center justify-center gap-2 font-medium rounded-lg transition-all duration-150 disabled:opacity-50 disabled:cursor-not-allowed";
  const sizes = { sm: "px-3 py-1.5 text-sm", md: "px-4 py-2.5 text-sm", lg: "px-6 py-3 text-base" };
  const variants = {
    primary: "bg-[#1E2A4A] text-white hover:bg-[#162038] shadow-sm",
    accent: "bg-[#E8A33D] text-[#1E2A4A] hover:bg-[#d9922a] shadow-sm font-semibold",
    ghost: "bg-transparent text-[#4A5568] hover:bg-[#F0EEE6]",
    danger: "bg-transparent text-[#C1443C] hover:bg-[#FBEAE8]",
    outline: "bg-white text-[#1E2A4A] border border-[#D9D5C9] hover:bg-[#F7F5EF]",
  };
  return React.createElement("button", { className: `${base} ${sizes[size]} ${variants[variant]} ${className}`, ...props }, children);
}

function Modal({ open, onClose, title, children, wide }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm" onClick={onClose}>
      <div className={`bg-white rounded-2xl shadow-2xl w-full ${wide ? "max-w-2xl" : "max-w-md"} max-h-[88vh] overflow-y-auto`} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-[#EDEAE0] sticky top-0 bg-white rounded-t-2xl">
          <h3 className="font-['Poppins'] font-semibold text-lg text-[#1E2A4A]">{title}</h3>
          <button onClick={onClose} className="p-1.5 rounded-full hover:bg-[#F0EEE6] text-[#4A5568]"><X size={18} /></button>
        </div>
        <div className="p-6">{children}</div>
      </div>
    </div>
  );
}

            <div className="flex items-center gap-2"><ImageIcon size={15} className="text-[#E8A33D]" /> Photo & video gallery</div>

function downloadFile(fileData, fileName) {
  if (!fileData) { alert("Is document ke liye koi file upload nahi hai."); return; }
  const a = document.createElement("a");
  a.href = fileData;
  a.download = fileName || "download";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

        </div>
      )}
      <Modal open={!!modal} onClose={() => setModal(null)} title={modal?.mode === "edit" ? "Edit Student" : "Add Student"}>
        <StudentForm initial={modal?.item} onSave={handleSave} onCancel={() => setModal(null)} />
      </Modal>
    </div>
  );
}

/* ============================================================
   STAFF SECTION
   ============================================================ */

function StaffForm({ initial, onSave, onCancel }) {
  const [form, setForm] = useState(initial || { name: "", designation: "", assignedClass: "8", assignedSection: "A", contact: "", email: "", joining: "" });
  return (
    <form onSubmit={(e) => { e.preventDefault(); onSave(form); }}>
      <Field label="Staff Name"><input required value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className={inputCls} /></Field>
      <Field label="Designation"><input required value={form.designation} onChange={(e) => setForm({ ...form, designation: e.target.value })} className={inputCls} placeholder="e.g. Teacher (Maths)" /></Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Assigned Class"><Select value={form.assignedClass} onChange={(e) => setForm({ ...form, assignedClass: e.target.value })} options={CLASSES} /></Field>
        <Field label="Assigned Section"><Select value={form.assignedSection} onChange={(e) => setForm({ ...form, assignedSection: e.target.value })} options={SECTIONS} /></Field>
      </div>
      <Field label="Email"><input type="email" value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} className={inputCls} /></Field>
      <Field label="Contact Number"><input value={form.contact} onChange={(e) => setForm({ ...form, contact: e.target.value })} className={inputCls} /></Field>
      <Field label="Joining Date"><input type="date" value={form.joining} onChange={(e) => setForm({ ...form, joining: e.target.value })} className={inputCls} /></Field>
      <div className="flex gap-2 mt-6">
        <Button type="submit" variant="accent" className="flex-1"><Save size={15} /> Save Staff</Button>
        <Button type="button" variant="outline" onClick={onCancel}>Cancel</Button>
      </div>
    </form>
  );
}

function StaffSection({ data, updateData, currentUser }) {
  const isAdmin = currentUser.role === "admin";
  const [filterClass, setFilterClass] = useState("All");
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);

  const filtered = useMemo(() => data.staff.filter((s) => {
    if (filterClass !== "All" && s.assignedClass !== filterClass) return false;
    if (search && !s.name.toLowerCase().includes(search.toLowerCase()) && !s.designation.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }), [data.staff, filterClass, search]);

  const handleSave = (form) => {
    if (modal.mode === "edit") updateData("staff", data.staff.map((s) => (s.id === modal.item.id ? { ...s, ...form } : s)));
    else updateData("staff", [...data.staff, { ...form, id: "st" + Date.now() }]);
    setModal(null);
  };
  const handleDelete = (id) => { if (confirm("Is staff member ka record delete karna hai?")) updateData("staff", data.staff.filter((s) => s.id !== id)); };

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <div><h2 className="font-['Poppins'] text-xl font-semibold text-[#1E2A4A]">Staff</h2><p className="text-sm text-[#8A8471]">{isAdmin ? "Sabhi teachers aur staff ka record." : "Staff directory (view only)."}</p></div>
        {isAdmin && <Button variant="accent" onClick={() => setModal({ mode: "add" })}><Plus size={16} /> Add Staff</Button>}
      </div>
      <div className="flex flex-wrap gap-2.5 mb-5">
        <div className="relative flex-1 min-w-[180px]">
          <Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-[#A9A492]" />
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Naam ya designation search karein..." className={`${inputCls} pl-9`} />
        </div>
        <div className="w-36"><Select value={filterClass} onChange={(e) => setFilterClass(e.target.value)} options={["All", ...CLASSES]} /></div>
      </div>
      {filtered.length === 0 ? <EmptyState icon={UserSquare2} title="Koi staff record nahi mila" subtitle="Naya staff member add karein." /> : (
        <div className="grid md:grid-cols-2 gap-4">
          {filtered.map((s) => (
            <div key={s.id} className="bg-white rounded-xl border border-[#EDEAE0] p-4 flex items-start gap-3">
              <div className="w-11 h-11 rounded-full bg-[#E8ECF5] flex items-center justify-center shrink-0 font-['Poppins'] font-semibold text-[#1E2A4A]">
                {s.name.split(" ").map((n) => n[0]).slice(0, 2).join("")}
              </div>
              <div className="flex-1 min-w-0">
                <p className="font-medium text-[#1E2A4A] text-sm">{s.name}</p>
                <p className="text-xs text-[#8A8471] mt-0.5">{s.designation}</p>
                <div className="flex items-center gap-1.5 mt-2"><Badge>Class {s.assignedClass}-{s.assignedSection}</Badge></div>
                <p className="text-xs text-[#8A8471] mt-2">{s.email} · {s.contact}</p>
              </div>
              {isAdmin && (
                <div className="flex flex-col gap-1">
                  <button onClick={() => setModal({ mode: "edit", item: s })} className="p-1.5 rounded-md hover:bg-[#F0EEE6] text-[#8A8471]"><Pencil size={14} /></button>
                  <button onClick={() => handleDelete(s.id)} className="p-1.5 rounded-md hover:bg-[#FBEAE8] text-[#C1443C]"><Trash2 size={14} /></button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
      <Modal open={!!modal} onClose={() => setModal(null)} title={modal?.mode === "edit" ? "Edit Staff" : "Add Staff"}>
        <StaffForm initial={modal?.item} onSave={handleSave} onCancel={() => setModal(null)} />
      </Modal>
    </div>
  );
}

/* ============================================================
   MAIN APP SHELL
   ============================================================ */

const NAV_ITEMS = [
  { key: "dashboard", label: "Dashboard", icon: LayoutDashboard },
  { key: "documents", label: "Documents", icon: FileText },
  { key: "gallery", label: "Gallery", icon: ImageIcon },
  { key: "timetable", label: "Timetable", icon: Calendar },
  { key: "students", label: "Students", icon: GraduationCap },
  { key: "staff", label: "Staff", icon: UserSquare2 },
];

function SchoolApp() {
  const [data, setData] = useState(loadDB);
  const [currentUser, setCurrentUser] = useState(null);
  const [activeSection, setActiveSection] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);

  useEffect(() => { persist(data); }, [data]);

  const updateData = (key, newArr) => setData((prev) => ({ ...prev, [key]: newArr }));

  if (!currentUser) return <LoginScreen users={data.users} onLogin={setCurrentUser} />;

  const renderSection = () => {
    switch (activeSection) {
      case "dashboard": return <Dashboard data={data} currentUser={currentUser} />;
      case "documents": return <DocumentsSection data={data} updateData={updateData} currentUser={currentUser} />;
      case "gallery": return <GallerySection data={data} updateData={updateData} />;
      case "timetable": return <TimetableSection data={data} updateData={updateData} />;
      case "students": return <StudentsSection data={data} updateData={updateData} currentUser={currentUser} />;
      case "staff": return <StaffSection data={data} updateData={updateData} currentUser={currentUser} />;
      default: return null;
    }
  };

  return (
    <div className="min-h-screen bg-[#FAF8F3] flex" style={{ fontFamily: "'Inter', sans-serif" }}>
      <aside className={`fixed md:static z-40 inset-y-0 left-0 w-64 bg-[#1E2A4A] text-white flex flex-col transition-transform duration-200 ${sidebarOpen ? "translate-x-0" : "-translate-x-full md:translate-x-0"}`}>
        <div className="flex items-center gap-2.5 px-5 py-5 border-b border-white/10">
          <div className="w-9 h-9 rounded-lg bg-[#E8A33D] flex items-center justify-center shrink-0"><School size={18} className="text-[#1E2A4A]" /></div>
          <div className="min-w-0">
            <p className="font-['Poppins'] font-semibold text-sm leading-tight truncate">School Register</p>
            <p className="text-white/50 text-xs">Admin Panel</p>
          </div>
          <button className="md:hidden ml-auto text-white/60" onClick={() => setSidebarOpen(false)}><X size={18} /></button>
        </div>
        <nav className="flex-1 px-3 py-4 space-y-1">
          {NAV_ITEMS.map((item) => (
            <button key={item.key} onClick={() => { setActiveSection(item.key); setSidebarOpen(false); }}
              className={`w-full flex items-center gap-3 px-3.5 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeSection === item.key ? "bg-[#E8A33D] text-[#1E2A4A]" : "text-white/70 hover:bg-white/10 hover:text-white"}`}>
              <item.icon size={17} />{item.label}
            </button>
          ))}
        </nav>
        <div className="px-3 py-4 border-t border-white/10">
          <div className="flex items-center gap-2.5 px-2 mb-3">
            <div className="w-8 h-8 rounded-full bg-white/15 flex items-center justify-center text-xs font-semibold shrink-0">
              {currentUser.name.split(" ").map((n) => n[0]).slice(0, 2).join("")}
            </div>
            <div className="min-w-0">
              <p className="text-sm font-medium truncate">{currentUser.name}</p>
              <p className="text-xs text-white/50 capitalize">{currentUser.role}</p>
            </div>
          </div>
          <button onClick={() => setCurrentUser(null)} className="w-full flex items-center gap-2.5 px-3.5 py-2 rounded-lg text-sm text-white/70 hover:bg-white/10 hover:text-white">
            <LogOut size={15} /> Logout
          </button>
        </div>
      </aside>
      {sidebarOpen && <div className="fixed inset-0 bg-black/40 z-30 md:hidden" onClick={() => setSidebarOpen(false)} />}
      <div className="flex-1 flex flex-col min-w-0">
        <header className="md:hidden flex items-center gap-3 px-4 py-3 bg-white border-b border-[#EDEAE0]">
          <button onClick={() => setSidebarOpen(true)} className="text-[#1E2A4A]"><Menu size={20} /></button>
          <p className="font-['Poppins'] font-semibold text-[#1E2A4A]">School Register</p>
        </header>
        <main className="flex-1 p-5 md:p-8 max-w-6xl w-full mx-auto">{renderSection()}</main>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SchoolApp />);
</script>
</body>
</html>
